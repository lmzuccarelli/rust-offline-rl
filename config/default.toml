[model]
model_id = "Qwen/Qwen3-0.6B"
dtype = "bf16"
max_prompt_length = 1024
max_response_length = 2048

[data]
logs_dir = "logs"
train_split = 0.9
prompt_truncation = "tail"
min_reward = -1.0

[training]
algorithm = "ilql"
optimizer = "paged_adamw"
num_epochs = 3
batch_size = 1
gradient_accumulation_steps = 8
learning_rate = 1e-5
warmup_steps = 50
max_steps = 1000
save_every = 500
eval_every = 50
output_dir = "checkpoints"
seed = 42

[training.adamw]
beta1 = 0.9
beta2 = 0.999
eps = 1e-8
weight_decay = 0.01

[training.scheduler]
type = "cosine"
min_lr = 1e-6

[dpo]
beta = 0.1
label_smoothing = 0.0
reward_margin = 0.1
pairing_strategy = "same_technique"

[rw_sft]
temperature = 1.0
normalization = "exponential"
reward_threshold = 0.5

[ilql]
gamma = 0.99
cql_alpha = 1.0
expectile_tau = 0.7
target_update_tau = 0.005
sft_weight = 0.1
q_head_layers = 2
